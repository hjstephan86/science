version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: resp_db
    environment:
      POSTGRES_USER: resp_user
      POSTGRES_PASSWORD: resp_pass
      POSTGRES_DB: resp_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resp_user -d resp_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: resp_api
    environment:
      DATABASE_URL: postgresql+asyncpg://resp_user:resp_pass@db:5432/resp_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: resp_frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
