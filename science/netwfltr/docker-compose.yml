version: "3.9"

services:
  netwatch:
    build: .
    container_name: netwatch
    ports:
      - "8000:8000"
    volumes:
      - netwatch_data:/data
    # Required for tcpdump packet capture
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host          # host mode so tcpdump sees all interfaces
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  netwatch_data:
